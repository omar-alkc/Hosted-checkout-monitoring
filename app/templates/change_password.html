{% extends "base.html" %}
{% block content %}
  <div class="auth-page">
    <p class="muted auth-back">
      {% if current_user.role == 'admin' %}
        <a href="/admin/users">← Users</a>
      {% else %}
        <a href="/detections">← Detections</a>
      {% endif %}
    </p>
    <h1>Change password</h1>
    {% if password_error %}
      <div class="error">{{ password_error }}</div>
    {% endif %}
    {% if password_saved %}
      <div class="flash success">Password updated.</div>
    {% endif %}
    <div class="panel">
      <form method="post" action="/account/password" onsubmit="amlFormBusy(this)">
        <label>Current password
          <input type="password" name="old_password" autocomplete="current-password" required />
        </label>
        <label>New password
          <input type="password" name="new_password" autocomplete="new-password" required minlength="8" />
        </label>
        <label>Confirm new password
          <input type="password" name="new_password2" autocomplete="new-password" required minlength="8" />
        </label>
        <p><button type="submit">Update password</button></p>
      </form>
    </div>
  </div>
{% endblock %}
