{% extends "base.html" %}
{% block content %}
  <p class="muted"><a href="/admin/users">← Users</a></p>
  <h1>Set password</h1>
  <p class="muted">User <strong>{{ target.username }}</strong> ({{ target.role }})</p>
  <div class="panel">
    <form method="post" action="/admin/users/{{ target.id }}/password" onsubmit="amlFormBusy(this)">
      <label>New password
        <input type="password" name="new_password" autocomplete="new-password" required minlength="8" />
      </label>
      <label>Confirm new password
        <input type="password" name="new_password2" autocomplete="new-password" required minlength="8" />
      </label>
      <p><button type="submit">Update password</button></p>
    </form>
  </div>
{% endblock %}
