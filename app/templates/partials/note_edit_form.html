<div>
  <form
    hx-post="/detections/{{ detection_id }}/notes/{{ note.id }}/edit"
    hx-target="#note-{{ note.id }}"
    hx-swap="outerHTML"
  >
    <label>Edit note
      <textarea name="body" required>{{ note.body }}</textarea>
    </label>
    <div style="display:flex; gap:0.5rem; align-items:center; margin-top: 0.5rem">
      <button type="submit">Save</button>
      <button
        type="button"
        class="button secondary"
        hx-get="/detections/{{ detection_id }}/notes/{{ note.id }}"
        hx-target="#note-{{ note.id }}"
        hx-swap="outerHTML"
      >Cancel</button>
    </div>
  </form>
</div>
