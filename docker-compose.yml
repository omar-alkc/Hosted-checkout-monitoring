services:
  db:
    image: postgres:16-alpine
    container_name: aml_web_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      # Override in `.env`; must match DATABASE_URL whenever the app runs outside Compose.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: aml_web
    # Host port 15433 avoids collisions with another Postgres often bound to 5433/5434.
    # Bind loopback only so Postgres is never reachable off the host NIC.
    ports:
      - "127.0.0.1:15433:5432"
    volumes:
      - aml_web_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aml_web"]
      interval: 3s
      timeout: 5s
      retries: 10

  # Web loads host `.env` as process env (file is not baked into the image — see `.dockerignore`).
  # Startup requires a 32+ char `SESSION_SECRET` or `ALLOW_INSECURE_DEV=true` (local/dev only; see `.env.example`).
  # Optional: `FORWARDED_ALLOW_IPS` (default in `docker-entrypoint.sh` is 127.0.0.1,172.16.0.0/12).
  web:
    build: .
    container_name: card_cashin_web
    restart: unless-stopped
    ports:
      # Loopback only — put Nginx/Caddy on the host for HTTPS and public access.
      - "127.0.0.1:8000:8000"
    environment:
      # Overrides DATABASE_URL from env_file so the container talks to Postgres on the Compose network (`db`).
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/aml_web
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  aml_web_pgdata:
